# Nginx reverse proxy cho datn.openpka.site
# Copy vào /etc/nginx/sites-available/ trên VPS
# Sau đó: sudo ln -s /etc/nginx/sites-available/datn.openpka.site.conf /etc/nginx/sites-enabled/
# SSL: sudo certbot --nginx -d datn.openpka.site

server {
    listen 80;
    server_name datn.openpka.site;

    # Let's Encrypt challenge (Certbot sẽ thêm location /.well-known/acme-challenge/)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    # Redirect HTTP -> HTTPS (sau khi có SSL)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name datn.openpka.site;

    # SSL certificates (Certbot tạo tự động)
    ssl_certificate /etc/letsencrypt/live/datn.openpka.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/datn.openpka.site/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy to frontend container (exposed on port 4200)
    location / {
        proxy_pass http://127.0.0.1:4200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
